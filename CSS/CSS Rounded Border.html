<!DOCTYPE html>
<html>
<head>
<style>
h1.normal{
	border:2px solid red;
}
p.round1{
	border:2px solid red;
	border-radius:8px;
}
p.round2{
	border:2px solid red;
	border-radius:10px;
}
p.round3{
	border:2px solid red;
	border-radius:12px;
}
</style>
</head>
<body>
<h1 class="normal">CSS Border Style</h1>
<p class="round1">This wil apply on the width of the border.</p>
<p class="round2">This style is used to design the website.</p>
<p class="round3">This property must be work on the webpages.</p>
</body>
</html>
