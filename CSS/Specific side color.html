<!DOCTYPE html>
<html>
<head>
<style>
p.one{
	border-style:double;
	border-color:red green blue yellow;
	/*red top green bottom blue right yellow left*/
}
p.two{
	border-style:solid;
	border-color:green blue yellow red;
	/*green top blue bottom yellow right red left*/
}
p.three{
	border-style:dotted;
	border-color:orange blue red green;
	/*orange top blue bottom red right green left*/
}
</style>
</head>
<body>
<h1 class="one">CSS Border Style</h1>
<p class="two">This wil apply on the width of the border.</p>
<p class="three">This style is used to design the website.</p>
</body>
</html>
