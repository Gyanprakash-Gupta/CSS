<!DOCTYPE html>
<html>
<head>
<style>
h1.one{
	border-style:double;
	border-width:5px 20px;
	/*5px top and bottom, 20px on the side*/
}
p.two{
	border-style:solid;
	border-width:20px 5px;
	/*20px top and bottom, 5px on the side*/
}
p.three{
	border-style:dotted;
	border-width:25px 10px 4px 35px;
	/*25px top 10px bottom 4px left 35px bottom*/
}
</style>
</head>
<body>
<h1 class="one">CSS Border Style</h1>
<p class="two">This wil apply on the width of the border.</p>
<p class="three">This style is used to design the website.</p>
</body>
</html>
