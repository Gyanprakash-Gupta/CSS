<DOCTYPE html>
<html>
<head>
<style>
*{
	box-sizing:border-box;
}
#example1{
	width:300px;
	padding:40px;
	border:2px solid blue;
	background:url(h.jpg);
}
#example2{
	width:300px;
	padding:40px;
	border:2px solid red;
	background:url(r.jpg);
}
</style>
</head>
<body>
<h1>The Universal Box-sizing</h1>
<div id="example1">This div has a full width of 300px,no matter padding or border!</div><br>
<div id="example2">This div also has a full width of 300 px, no matter padding or border!</div>
</body>
</html>
