<!DOCTYPE html>
<html>
<head>
<style>
h1.one{
	border-style:double;
	border-width:thin;
}
p.two{
	border-style:solid;
	border-width:medium;
}
p.three{
	border-style:dotted;
	border-width:2px;
}
p.four{
	border-style:dotted;
	border-width:thick;
}
</style>
</head>
<body>
<h1 class="one">CSS Border Style</h1>
<p class="two">This wil apply on the width of the border.</p>
<p class="three">This style is used to design the website.</p>
<p class="four">This property is most valuable to use.</p>
</body>
</html>
